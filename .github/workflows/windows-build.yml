name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore solution
        run: dotnet restore StarConfig.sln

      - name: Build solution
        run: dotnet build StarConfig.sln -c Release --no-restore

      - name: Run Star Citizen profile regression tests
        run: dotnet run --project .\src\StarConfig.Smoke\StarConfig.Smoke.csproj -c Release

      - name: Publish Starbind portable application
        run: dotnet publish .\src\StarConfig.App\StarConfig.App.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true --no-restore -o .\artifacts\Starbind

      - name: Verify portable executable
        shell: pwsh
        run: |
          if (-not (Test-Path '.\artifacts\Starbind\Starbind.exe')) { throw 'Starbind.exe was not produced.' }
          Get-Item '.\artifacts\Starbind\Starbind.exe' | Format-List FullName,Length,LastWriteTime

      - name: Create installer payload
        shell: pwsh
        run: |
          $payload = '.\src\StarConfig.Installer\Payload.zip'
          if (Test-Path $payload) { Remove-Item $payload -Force }
          Compress-Archive -Path '.\artifacts\Starbind\*' -DestinationPath $payload -CompressionLevel Optimal
          if (-not (Test-Path $payload)) { throw 'Payload.zip was not produced.' }

      - name: Restore installer
        run: dotnet restore .\src\StarConfig.Installer\StarConfig.Installer.csproj

      - name: Publish Starbind installer
        run: dotnet publish .\src\StarConfig.Installer\StarConfig.Installer.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true --no-restore -o .\artifacts\Installer

      - name: Verify installer executable
        shell: pwsh
        run: |
          if (-not (Test-Path '.\artifacts\Installer\Starbind-Setup.exe')) { throw 'Starbind-Setup.exe was not produced.' }
          Get-Item '.\artifacts\Installer\Starbind-Setup.exe' | Format-List FullName,Length,LastWriteTime

      - name: Upload portable application
        uses: actions/upload-artifact@v4
        with:
          name: Starbind-v0.4.0-portable
          path: artifacts/Starbind
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Starbind-Setup-v0.4.0
          path: artifacts/Installer/Starbind-Setup.exe
          if-no-files-found: error
