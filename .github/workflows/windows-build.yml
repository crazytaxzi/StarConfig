name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore StarConfig.sln

      - name: Build
        run: dotnet build StarConfig.sln -c Release --no-restore

      - name: Publish Windows x64
        run: dotnet publish .\src\StarConfig\StarConfig.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true --no-restore -o .\artifacts\StarConfig

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: StarConfig-win-x64
          path: artifacts/StarConfig
