name: Capture Starbind 0.7.1 Correction UI

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/capture-starbind-v071.yml'
      - 'src/StarConfig.App/**'
  workflow_dispatch:

jobs:
  capture:
    runs-on: windows-latest
    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Publish Starbind
        shell: pwsh
        run: |
          dotnet restore .\src\StarConfig.App\StarConfig.App.csproj
          dotnet publish .\src\StarConfig.App\StarConfig.App.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true --no-restore -o .\capture\app

      - name: Create representative profile and unrelated XML
        shell: pwsh
        run: |
          $profileDir = Join-Path $env:RUNNER_TEMP 'StarCitizen\LIVE\USER\Client\0\Controls\Mappings'
          New-Item -ItemType Directory -Force -Path $profileDir | Out-Null
          '<not-a-control-profile><actionmaps /></not-a-control-profile>' | Set-Content (Join-Path $profileDir 'actionmaps.xml') -Encoding utf8
          $profile = Join-Path $profileDir 'layout_HOSAS_Correction_exported.xml'
          @'
          <ActionMaps>
            <ActionProfiles version="1" optionsVersion="2" rebindVersion="2" profileName="HOSAS Correction">
              <options type="keyboard" instance="1" Product="Keyboard" />
              <options type="mouse" instance="1" Product="Mouse" />
              <options type="joystick" instance="1" Product="VKBsim Gladiator EVO R {0200231D-0000-0000-0000-504944564944}" />
              <options type="joystick" instance="2" Product="VKBsim Gladiator EVO L {0201231D-0000-0000-0000-504944564944}" />
              <options type="joystick" instance="3" Product="VKB STECS Standard {0300231D-0000-0000-0000-504944564944}" />
              <options type="joystick" instance="4" Product="Logitech Pro Rudder Pedals {0400231D-0000-0000-0000-504944564944}" />
              <actionmap name="spaceship_movement">
                <action name="v_strafe_longitudinal"><rebind input="js1_z" /></action>
                <action name="v_strafe_lateral"><rebind input="js2_x" /></action>
                <action name="v_pitch"><rebind input="js1_y" /></action>
                <action name="v_yaw"><rebind input="js1_x" /></action>
                <action name="v_roll"><rebind input="js4_x" /></action>
              </actionmap>
              <actionmap name="spaceship_general">
                <action name="v_operator_mode_cycle"><rebind input="js1_button8" /></action>
                <action name="v_operator_mode_cycle"><rebind input="js2_button8" /></action>
                <action name="v_master_mode_cycle"><rebind input="js1_button9" /></action>
                <action name="v_master_mode_cycle"><rebind input="js2_button9" /></action>
              </actionmap>
              <actionmap name="spaceship_scanning">
                <action name="v_invoke_ping"><rebind input="js2_button28" /></action>
                <action name="v_scan_trigger_scan"><rebind input="js2_button27" /></action>
              </actionmap>
              <actionmap name="vehicle_movement"><action name="vehicle_throttle_abs"><rebind input="js1_z" /></action></actionmap>
              <actionmap name="player"><action name="moveforward"><rebind input="js1_z" /></action><action name="jump"><rebind input="kb1_space" /></action></actionmap>
              <actionmap name="turret_movement"><action name="turret_elevation"><rebind input="js1_z" /></action></actionmap>
              <actionmap name="spaceship_mining"><action name="v_mining_throttle"><rebind input="js3_z" /></action></actionmap>
              <actionmap name="spaceship_salvage"><action name="v_salvage_beam_axis"><rebind input="js3_slider1" /></action></actionmap>
            </ActionProfiles>
          </ActionMaps>
          '@ | Set-Content -Path $profile -Encoding utf8
          $settingsDir = Join-Path $env:LOCALAPPDATA 'Starbind'
          New-Item -ItemType Directory -Force -Path $settingsDir | Out-Null
          @{ LastProfile=$profile; LauncherPath=$null; ProfileFolders=@($profileDir); DeviceRoleOverrides=@{}; ConfirmBeforeWrite=$true } |
            ConvertTo-Json -Depth 5 | Set-Content (Join-Path $settingsDir 'settings-v5.json') -Encoding utf8

      - name: Launch and capture actual application window
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          Add-Type @'
          using System;
          using System.Runtime.InteropServices;
          public static class WindowCaptureNative {
            [StructLayout(LayoutKind.Sequential)] public struct RECT { public int Left, Top, Right, Bottom; }
            [DllImport("user32.dll")] public static extern bool GetWindowRect(IntPtr hWnd, out RECT rect);
            [DllImport("user32.dll")] public static extern bool PrintWindow(IntPtr hWnd, IntPtr hdcBlt, uint flags);
            [DllImport("user32.dll")] public static extern bool ShowWindow(IntPtr hWnd, int command);
            [DllImport("user32.dll")] public static extern bool SetForegroundWindow(IntPtr hWnd);
            [DllImport("user32.dll")] public static extern bool MoveWindow(IntPtr hWnd, int x, int y, int width, int height, bool repaint);
          }
          '@
          $process = Start-Process (Resolve-Path '.\capture\app\Starbind.exe') -PassThru
          $deadline = (Get-Date).AddSeconds(30)
          do { Start-Sleep -Milliseconds 250; $process.Refresh() } while ($process.MainWindowHandle -eq 0 -and (Get-Date) -lt $deadline)
          if ($process.MainWindowHandle -eq 0) { throw 'Starbind did not create a visible main window.' }
          [WindowCaptureNative]::ShowWindow($process.MainWindowHandle, 1) | Out-Null
          [WindowCaptureNative]::MoveWindow($process.MainWindowHandle, 0, 0, 1920, 1080, $true) | Out-Null
          [WindowCaptureNative]::SetForegroundWindow($process.MainWindowHandle) | Out-Null
          Start-Sleep -Seconds 8
          $rect = New-Object WindowCaptureNative+RECT
          [WindowCaptureNative]::GetWindowRect($process.MainWindowHandle, [ref]$rect) | Out-Null
          $bitmap = New-Object System.Drawing.Bitmap ($rect.Right-$rect.Left), ($rect.Bottom-$rect.Top), ([System.Drawing.Imaging.PixelFormat]::Format32bppArgb)
          $graphics = [System.Drawing.Graphics]::FromImage($bitmap); $hdc = $graphics.GetHdc()
          try { $printed = [WindowCaptureNative]::PrintWindow($process.MainWindowHandle, $hdc, 2) } finally { $graphics.ReleaseHdc($hdc); $graphics.Dispose() }
          if (-not $printed) { throw 'PrintWindow failed.' }
          New-Item -ItemType Directory -Force '.\capture\screenshot' | Out-Null
          $file = '.\capture\screenshot\Starbind-v0.7.1-correction-window.png'
          $bitmap.Save($file, [System.Drawing.Imaging.ImageFormat]::Png); $bitmap.Dispose()
          Stop-Process -Id $process.Id -Force

      - name: Upload actual UI screenshot
        uses: actions/upload-artifact@v4
        with:
          name: Starbind-v0.7.1-correction-ui
          path: capture/screenshot/Starbind-v0.7.1-correction-window.png
          if-no-files-found: error
