name: Publish StarConfig Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: starconfig-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build application and installer
        shell: cmd
        run: call BUILD-STARCONFIG.cmd

      - name: Verify installer exists
        shell: powershell
        run: |
          $installer = Join-Path $env:GITHUB_WORKSPACE 'dist\Installer\StarConfig-Setup.exe'
          if (-not (Test-Path $installer)) {
            Write-Error "Installer was not produced at $installer"
            exit 1
          }
          Get-Item $installer | Format-List FullName,Length,LastWriteTime

      - name: Publish or replace v0.1.0 release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = 'v0.1.0'
          $installer = Join-Path $env:GITHUB_WORKSPACE 'dist\Installer\StarConfig-Setup.exe'
          $notes = @'
          StarConfig v0.1.0

          Initial Windows installer release.

          Included:
          - Visual Star Citizen control-profile editor
          - Automatic profile discovery
          - Searchable action browser
          - Keyboard, mouse, joystick button, axis, and hat capture
          - Cross-state binding selection
          - Exact XML action-map editing
          - Timestamped backups before every save
          - RSI Launcher integration
          - Per-user Windows installation and uninstall support
          '@

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $installer --clobber --repo $env:GITHUB_REPOSITORY
            gh release edit $tag --title 'StarConfig v0.1.0' --notes $notes --prerelease --repo $env:GITHUB_REPOSITORY
          }
          else {
            gh release create $tag $installer --target $env:GITHUB_SHA --title 'StarConfig v0.1.0' --notes $notes --prerelease --repo $env:GITHUB_REPOSITORY
          }
