name: Publish Starbind Release

on:
  push:
    branches: [ main ]
    paths:
      - '.release-trigger/v0.4.0.txt'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: starbind-release-v0.4.0
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore and test
        run: |
          dotnet restore StarConfig.sln
          dotnet build StarConfig.sln -c Release --no-restore
          dotnet run --project .\src\StarConfig.Smoke\StarConfig.Smoke.csproj -c Release

      - name: Publish Starbind application
        run: dotnet publish .\src\StarConfig.App\StarConfig.App.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true --no-restore -o .\dist\Starbind

      - name: Create installer payload
        shell: pwsh
        run: |
          $app = '.\dist\Starbind\Starbind.exe'
          if (-not (Test-Path $app)) { throw 'Starbind.exe was not produced.' }
          $payload = '.\src\StarConfig.Installer\Payload.zip'
          if (Test-Path $payload) { Remove-Item $payload -Force }
          Compress-Archive -Path '.\dist\Starbind\*' -DestinationPath $payload -CompressionLevel Optimal
          if (-not (Test-Path $payload)) { throw 'Payload.zip was not produced.' }

      - name: Build installer
        run: |
          dotnet restore .\src\StarConfig.Installer\StarConfig.Installer.csproj
          dotnet publish .\src\StarConfig.Installer\StarConfig.Installer.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true --no-restore -o .\dist\Installer

      - name: Verify and hash installer
        shell: pwsh
        run: |
          $installer = '.\dist\Installer\Starbind-Setup.exe'
          if (-not (Test-Path $installer)) { throw 'Starbind-Setup.exe was not produced.' }
          $hash = (Get-FileHash $installer -Algorithm SHA256).Hash
          "SHA256  $hash  Starbind-Setup.exe" | Set-Content '.\dist\Installer\Starbind-Setup.exe.sha256.txt'
          Get-Item $installer | Format-List FullName,Length,LastWriteTime

      - name: Upload verified release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Starbind-Setup-v0.4.0
          path: |
            dist/Installer/Starbind-Setup.exe
            dist/Installer/Starbind-Setup.exe.sha256.txt
          if-no-files-found: error

      - name: Publish Starbind v0.4.0
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.4.0
          name: Starbind v0.4.0
          target_commitish: main
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            dist/Installer/Starbind-Setup.exe
            dist/Installer/Starbind-Setup.exe.sha256.txt
          body: |
            Starbind v0.4.0 replaces the nonfunctional prototype with the control-first mapper represented by the approved design.

            - Reads exact joystick product names and instances from the Star Citizen profile instead of displaying generic WinMM driver names
            - Preserves multiple rebind elements and attributes such as multiTap
            - Correctly treats placeholder inputs such as `js2_ ` and `kb1_ ` as unbound
            - Selects a physical control first and shows every assignment that uses it across game states
            - Suggests semantically compatible actions without merging toggle, cycle, hold, direct, or axis behaviors
            - Provides explicit keep/remove confirmation before changing cross-state bindings
            - Uses the approved joystick artwork and callout-centered layout
            - Reads and writes joystick deadzones from deviceoptions
            - Creates a timestamped backup and validates the XML before replacement
            - Migrates the old StarConfig installation to the renamed Starbind application
            - Includes automated profile regression tests based on real Star Citizen export structure
