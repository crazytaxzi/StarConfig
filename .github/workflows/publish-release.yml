name: Publish StarConfig Release

on:
  push:
    branches: [ main ]
    paths:
      - '.release-trigger/v0.3.0.txt'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: starconfig-release-v0.3.0
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore and build application
        run: |
          dotnet restore .\src\StarConfig.App\StarConfig.App.csproj
          dotnet publish .\src\StarConfig.App\StarConfig.App.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true --no-restore -o .\dist\StarConfig

      - name: Create installer payload
        shell: pwsh
        run: |
          $app = '.\dist\StarConfig\StarConfig.exe'
          if (-not (Test-Path $app)) { throw 'StarConfig.exe was not produced.' }
          $payload = '.\src\StarConfig.Installer\Payload.zip'
          if (Test-Path $payload) { Remove-Item $payload -Force }
          Compress-Archive -Path '.\dist\StarConfig\*' -DestinationPath $payload -CompressionLevel Optimal
          if (-not (Test-Path $payload)) { throw 'Payload.zip was not produced.' }

      - name: Build installer
        run: |
          dotnet restore .\src\StarConfig.Installer\StarConfig.Installer.csproj
          dotnet publish .\src\StarConfig.Installer\StarConfig.Installer.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true --no-restore -o .\dist\Installer

      - name: Verify installer
        shell: pwsh
        run: |
          $installer = '.\dist\Installer\StarConfig-Setup.exe'
          if (-not (Test-Path $installer)) { throw 'StarConfig-Setup.exe was not produced.' }
          $hash = (Get-FileHash $installer -Algorithm SHA256).Hash
          "SHA256: $hash" | Set-Content '.\dist\Installer\StarConfig-Setup.exe.sha256.txt'
          Get-Item $installer | Format-List FullName,Length,LastWriteTime

      - name: Upload verified installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarConfig-Setup-v0.3.0
          path: |
            dist/Installer/StarConfig-Setup.exe
            dist/Installer/StarConfig-Setup.exe.sha256.txt
          if-no-files-found: error

      - name: Publish StarConfig v0.3.0 release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.3.0
          name: StarConfig v0.3.0
          target_commitish: main
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            dist/Installer/StarConfig-Setup.exe
            dist/Installer/StarConfig-Setup.exe.sha256.txt
          body: |
            StarConfig v0.3.0 rebuilds the application around the actual control-mapping job.

            - Select a physical keyboard, mouse, joystick button, hat or axis first
            - See that control's existing assignments across Flight, Vehicle, On Foot, EVA, Turret, Mining and Salvage
            - Choose or remove each state assignment in one workspace
            - Receive explicit same-intent suggestions without merging toggle, cycle, hold or axis behaviors
            - Browse actions with human-readable explanations and semantic peers
            - Detect duplicate and unrelated bindings before saving
            - Open exported layout_*_exported.xml profiles directly and remember the selected profile
            - Validate and back up profiles before safe XML replacement
            - Install as a self-contained Windows application with no separate .NET runtime required
