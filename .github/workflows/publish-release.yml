name: Publish StarConfig Release

on:
  push:
    branches: [ main ]
    paths:
      - '.release-trigger/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: starconfig-release-v0.2.0
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore application
        run: dotnet restore .\src\StarConfig.App\StarConfig.App.csproj

      - name: Publish StarConfig application
        shell: powershell
        run: |
          $appOut = Join-Path $env:GITHUB_WORKSPACE 'dist\StarConfig'
          New-Item -ItemType Directory -Force -Path $appOut | Out-Null
          dotnet publish .\src\StarConfig.App\StarConfig.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            --no-restore `
            -o $appOut
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path (Join-Path $appOut 'StarConfig.exe'))) { throw 'StarConfig.exe was not produced.' }

      - name: Create installer payload
        shell: powershell
        run: |
          $appOut = Join-Path $env:GITHUB_WORKSPACE 'dist\StarConfig'
          $payload = Join-Path $env:GITHUB_WORKSPACE 'src\StarConfig.Installer\Payload.zip'
          if (Test-Path $payload) { Remove-Item $payload -Force }
          Compress-Archive -Path "$appOut\*" -DestinationPath $payload -CompressionLevel Optimal
          if (-not (Test-Path $payload)) { throw 'Payload.zip was not produced.' }

      - name: Restore installer
        run: dotnet restore .\src\StarConfig.Installer\StarConfig.Installer.csproj

      - name: Publish StarConfig installer
        shell: powershell
        run: |
          $installerOut = Join-Path $env:GITHUB_WORKSPACE 'dist\Installer'
          New-Item -ItemType Directory -Force -Path $installerOut | Out-Null
          dotnet publish .\src\StarConfig.Installer\StarConfig.Installer.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            --no-restore `
            -o $installerOut
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path (Join-Path $installerOut 'StarConfig-Setup.exe'))) { throw 'StarConfig-Setup.exe was not produced.' }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarConfig-Setup-v0.2.0
          path: dist/Installer/StarConfig-Setup.exe
          if-no-files-found: error

      - name: Publish StarConfig v0.2.0 prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.0
          name: StarConfig v0.2.0
          target_commitish: main
          draft: false
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          overwrite_files: true
          files: dist/Installer/StarConfig-Setup.exe
          body: |
            Cockpit interface redesign.

            - Visual physical-control mapping workspace
            - Interactive joystick controls and live input capture
            - Game-state assignment and conflict visibility
            - Action browser moved to a secondary tool
            - Safe Star Citizen XML editing with timestamped backups
            - Self-contained Windows installer
