name: Publish Starbind Release

on:
  push:
    branches: [ main ]
    paths:
      - '.release-trigger/v0.5.0.txt'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: starbind-release-v0.5.0
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore, build and run regression suite
        run: |
          dotnet restore StarConfig.sln
          dotnet build StarConfig.sln -c Release --no-restore
          dotnet run --project .\src\StarConfig.Smoke\StarConfig.Smoke.csproj -c Release

      - name: Publish Starbind application
        run: dotnet publish .\src\StarConfig.App\StarConfig.App.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true --no-restore -o .\dist\Starbind

      - name: Launch-test the packaged desktop application
        shell: pwsh
        run: |
          $app = '.\dist\Starbind\Starbind.exe'
          if (-not (Test-Path $app)) { throw 'Starbind.exe was not produced.' }
          $process = Start-Process $app -PassThru
          Start-Sleep -Seconds 6
          if ($process.HasExited) { throw "Starbind exited during startup with code $($process.ExitCode)." }
          Stop-Process -Id $process.Id -Force

      - name: Create installer payload
        shell: pwsh
        run: |
          $payload = '.\src\StarConfig.Installer\Payload.zip'
          if (Test-Path $payload) { Remove-Item $payload -Force }
          Compress-Archive -Path '.\dist\Starbind\*' -DestinationPath $payload -CompressionLevel Optimal
          if (-not (Test-Path $payload)) { throw 'Payload.zip was not produced.' }

      - name: Build installer
        run: |
          dotnet restore .\src\StarConfig.Installer\StarConfig.Installer.csproj
          dotnet publish .\src\StarConfig.Installer\StarConfig.Installer.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true --no-restore -o .\dist\Installer

      - name: Verify and hash installer
        shell: pwsh
        run: |
          $installer = '.\dist\Installer\Starbind-Setup.exe'
          if (-not (Test-Path $installer)) { throw 'Starbind-Setup.exe was not produced.' }
          $hash = (Get-FileHash $installer -Algorithm SHA256).Hash
          "SHA256  $hash  Starbind-Setup.exe" | Set-Content '.\dist\Installer\Starbind-Setup.exe.sha256.txt'
          Get-Item $installer | Format-List FullName,Length,LastWriteTime

      - name: Upload verified release artifact
        uses: actions/upload-artifact@v4
        with:
          name: Starbind-Setup-v0.5.0
          path: |
            dist/Installer/Starbind-Setup.exe
            dist/Installer/Starbind-Setup.exe.sha256.txt
          if-no-files-found: error

      - name: Publish Starbind v0.5.0
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.5.0
          name: Starbind v0.5.0
          target_commitish: main
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            dist/Installer/Starbind-Setup.exe
            dist/Installer/Starbind-Setup.exe.sha256.txt
          body: |
            Starbind v0.5.0 implements the complete control-cockpit workflow represented by the approved application design.

            - Device-specific definitions and named controls for VKB Gladiator, VKB STECS, Logitech/Saitek pedals, Thrustmaster T.16000M, VIRPIL, gamepads, keyboard and mouse
            - Clickable physical control callouts anchored to hardware-specific layouts
            - Working device cards, device selector, named Axes, Triggers, Buttons, Hats, Encoders and System Controls
            - Working View in 3D, Test Device, Show Unassigned Only and Zoom controls
            - Live control response, persistent deadzones and persistent response curves
            - Primary action menu, per-state assignment selectors and staged multi-control editing
            - Explicit Yes Keep All / No Let Me Choose / Remove From Which State workflow
            - Action comparison, expanded plain-language action intelligence and strict Axis, Toggle, Cycle, Hold and Direct behavior separation
            - Operator Mode and Master Mode remain distinct intents
            - Working conflict list and Resolve All workflow
            - Working Profiles, Settings, Help, profile import, duplicate and export tools
            - Split Save menu, Validate, Backup and Save & Launch controls
            - One timestamped backup and XML validation before a complete workspace save replaces the original profile
            - Automated profile, hardware, cross-state, curve-persistence, startup, portable-app and installer verification

      - name: Download and verify the public release asset
        shell: pwsh
        run: |
          $built = '.\dist\Installer\Starbind-Setup.exe'
          $downloaded = Join-Path $env:RUNNER_TEMP 'Starbind-Setup-public.exe'
          $url = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/v0.5.0/Starbind-Setup.exe"
          $expectedHash = (Get-FileHash $built -Algorithm SHA256).Hash
          $attempts = 0
          do {
            $attempts++
            try {
              Invoke-WebRequest -Uri $url -OutFile $downloaded -MaximumRedirection 10
              $actualHash = (Get-FileHash $downloaded -Algorithm SHA256).Hash
              if ($actualHash -ne $expectedHash) { throw "Published installer hash mismatch. Expected $expectedHash but received $actualHash." }
              break
            }
            catch {
              if ($attempts -ge 6) { throw }
              Start-Sleep -Seconds 10
            }
          } while ($true)
          "Version: 0.5.0" | Set-Content release-verification.txt
          "Asset: Starbind-Setup.exe" | Add-Content release-verification.txt
          "SHA256: $expectedHash" | Add-Content release-verification.txt
          "VerifiedAtUtc: $([DateTime]::UtcNow.ToString('o'))" | Add-Content release-verification.txt

      - name: Record public release verification
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force '.release-verified' | Out-Null
          Copy-Item release-verification.txt '.release-verified\v0.5.0.txt' -Force
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add '.release-verified/v0.5.0.txt'
          if (-not (git diff --cached --quiet)) {
            git commit -m 'Verify public Starbind v0.5.0 installer'
            git push origin HEAD:main
          }
